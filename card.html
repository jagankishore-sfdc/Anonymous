<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Milkyyy ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial,Helvetica,sans-serif;
}

canvas{
    display:block;
}

.message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    z-index:10;
    animation:fade 2s ease-in-out infinite alternate;
}

.message h1{
    font-size:4rem;
    color:#ff4d88;
    text-shadow:0 0 20px #ff4d88;
}

.message h2{
    margin-top:20px;
    font-size:2rem;
    color:white;
}

.message p{
    margin-top:20px;
    font-size:1.3rem;
    color:#ffd6e7;
}

@keyframes fade{
from{
transform:translate(-50%,-50%) scale(1);
}
to{
transform:translate(-50%,-50%) scale(1.05);
}
}
</style>
</head>

<body>

<div class="message">
<h1>❤️ Milkyyy ❤️</h1>
<h2>I Love You Forever</h2>
<p>
Every heartbeat of mine whispers your name.<br>
You are my happiness, my peace, my forever. ❤️
</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z=120;

const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const particles=10000;
const geometry=new THREE.BufferGeometry();

const positions=[];

for(let i=0;i<particles;i++){

let t=Math.random()*Math.PI*2;

let x=16*Math.pow(Math.sin(t),3);
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

positions.push(
x*4+(Math.random()-0.5)*3,
y*4+(Math.random()-0.5)*3,
(Math.random()-0.5)*10
);

}

geometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(positions,3)
);

const material=new THREE.PointsMaterial({
color:0xff3366,
size:1.5
});

const heart=new THREE.Points(geometry,material);
scene.add(heart);

function animate(){

requestAnimationFrame(animate);

heart.rotation.y+=0.003;
heart.rotation.x=Math.sin(Date.now()*0.001)*0.1;

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
